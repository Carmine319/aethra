<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AETHRA — Ideas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/core/tokens.css" />
  <link rel="stylesheet" href="/core/system.css" />
  <link rel="stylesheet" href="/core/narrative.css" />
  <link rel="stylesheet" href="/core/organism.css" />
  <link rel="stylesheet" href="/core/motion.css" />
</head>
<body>
  <div class="organism-bg"></div>
  <div class="organism-fallback"></div>
  <nav id="navbar"></nav>
  <main class="container">
    <section class="section">
      <div class="card">
        <p class="kicker">Ideas</p>
        <h1>Turn Your Idea Into Revenue</h1>
        <p>AETHRA validates, builds, and deploys ideas into real revenue systems.</p>
        <form method="post" action="#" class="form-grid">
          <label>Idea description<textarea name="ideaDescription" required placeholder="Describe the core idea, problem, and why now."></textarea></label>
          <label>Target audience<input type="text" name="targetAudience" required placeholder="Who specifically is this for?" /></label>
          <label>Desired outcome<input type="text" name="desiredOutcome" required placeholder="What result should this system produce?" /></label>
          <label>Brand name (optional)<input type="text" name="brandName" placeholder="Optional proposed brand name" /></label>
          <label>Social media handles<input type="text" name="socialHandles" required placeholder="@handle, profile URL, or account list" /></label>
          <label>Email<input type="email" name="email" required placeholder="you@company.com" /></label>
          <div><button type="submit" class="btn btn-primary">Submit Idea</button></div>
        </form>
        <p>AETHRA evaluates submissions and deploys high-potential ideas into live systems. Revenue share applies only when revenue is generated.</p>
      </div>
    </section>
  </main>
  <script src="/components/navbar.js" defer></script>
  <script src="/components/card.js" defer></script>
  <script src="/components/button.js" defer></script>
</body>
</html>
