<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AETHRA — Public results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/unified-system.css" />
</head>
<body class="organism-surface">
  <main class="wrap editorial">
  <div class="section-inner reveal narrow">
    <h1 class="section-title">AETHRA results</h1>
    <p class="muted">Anonymised venture signals — no personal identifiers.</p>
    <div id="content"><p class="muted">Loading…</p></div>
  </div>
  </main>
  <script src="/unified-system.js" defer></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id") || "";
      var el = document.getElementById("content");
      if (!id) {
        el.innerHTML = '<p class="err">Missing report id. Open a share link from a completed AETHRA run.</p>';
        return;
      }
      fetch("/api/v1/public-report?id=" + encodeURIComponent(id))
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (!j.ok || !j.report) {
            el.innerHTML = '<p class="err">Report not found or not yet published.</p>';
            return;
          }
          var rep = j.report;
          var html = "";
          if (rep.verdict != null) html += "<p><strong>Verdict:</strong> " + escapeHtml(String(rep.verdict)) + "</p>";
          if (rep.confidence != null) html += "<p><strong>Confidence:</strong> " + escapeHtml(String(rep.confidence)) + "</p>";
          if (rep.thesis_line) html += "<p>" + escapeHtml(rep.thesis_line) + "</p>";
          if (rep.ideas_preview && rep.ideas_preview.length) {
            html += "<p><strong>Opportunity preview</strong></p><ul>";
            rep.ideas_preview.forEach(function (x) {
              html += "<li>" + escapeHtml(x.idea || "") + (x.score != null ? " — " + escapeHtml(String(x.score)) : "") + "</li>";
            });
            html += "</ul>";
          }
          html += '<p class="muted">This plan was generated by AETHRA — an autonomous business operator.</p>';
          el.innerHTML = html;
        })
        .catch(function () {
          el.innerHTML = '<p class="err">Could not load report.</p>';
        });
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    })();
  </script>
</body>
</html>
