<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AETHRA — Public results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <style>
    :root { --ink: #2f3e46; --muted: #6b7280; --gold: #d4af37; --bg: #f2ede4; }
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.65; padding: 2rem clamp(1rem, 4vw, 3rem); }
    h1 { font-family: "Playfair Display", Georgia, serif; font-size: 1.75rem; margin: 0 0 0.5rem; }
    .card { max-width: 36rem; background: rgba(255,255,255,0.75); border: 1px solid rgba(47,62,70,0.08); border-radius: 18px; padding: 1.75rem; box-shadow: 0 12px 40px rgba(47,62,70,0.06); }
    .muted { color: var(--muted); font-size: 0.92rem; margin-top: 1rem; }
    ul { margin: 1rem 0 0; padding-left: 1.25rem; }
    a { color: var(--gold); }
    .err { color: #b04a4a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AETHRA results</h1>
    <p class="muted" style="margin-top:0">Anonymised venture signals — no personal identifiers.</p>
    <div id="content"><p class="muted">Loading…</p></div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id") || "";
      var el = document.getElementById("content");
      if (!id) {
        el.innerHTML = '<p class="err">Missing report id. Open a share link from a completed AETHRA run.</p>';
        return;
      }
      fetch("/api/v1/public-report?id=" + encodeURIComponent(id))
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (!j.ok || !j.report) {
            el.innerHTML = '<p class="err">Report not found or not yet published.</p>';
            return;
          }
          var rep = j.report;
          var html = "";
          if (rep.verdict != null) html += "<p><strong>Verdict:</strong> " + escapeHtml(String(rep.verdict)) + "</p>";
          if (rep.confidence != null) html += "<p><strong>Confidence:</strong> " + escapeHtml(String(rep.confidence)) + "</p>";
          if (rep.thesis_line) html += "<p>" + escapeHtml(rep.thesis_line) + "</p>";
          if (rep.ideas_preview && rep.ideas_preview.length) {
            html += "<p><strong>Opportunity preview</strong></p><ul>";
            rep.ideas_preview.forEach(function (x) {
              html += "<li>" + escapeHtml(x.idea || "") + (x.score != null ? " — " + escapeHtml(String(x.score)) : "") + "</li>";
            });
            html += "</ul>";
          }
          html += '<p class="muted">This plan was generated by AETHRA — an autonomous business operator.</p>';
          el.innerHTML = html;
        })
        .catch(function () {
          el.innerHTML = '<p class="err">Could not load report.</p>';
        });
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    })();
  </script>
</body>
</html>
